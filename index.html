<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Static Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      color: #2563eb;
    }

    p {
      font-size: 18px;
    }

    button {
      margin-top: 20px;
      padding: 12px 24px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Hello from Amazon S3 🚀</h1>

    <p>
      This is a static website hosted using an S3 bucket.
    </p>

    <button onclick="showMessage()">
      Click Me
    </button>

    <p id="message"></p>
  </div>


  <script>
    function showMessage() {
      document.getElementById("message").innerHTML =
        "Your S3 static website is working!";
    }
  </script>

</body>
</html>
